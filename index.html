<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>반틈 with 핑티</title>
    <meta name="description" content="반,짝임 · 2026 상반기 회고 프로그램 — 반틈 with 핑티" />

    <!-- 공유 미리보기 (Open Graph) -->
    <meta property="og:title" content="반틈 with 핑티" />
    <meta property="og:description" content="올해의 반을 평가하지 말고, 읽어보세요. 몸과 마음, 일과 사람을 함께 돌아보는 질문 카드." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- 글꼴: CSS @import 대신 preconnect + link (렌더링 차단 최소화) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />

    <!-- 첫 화면 이미지 미리 불러오기 -->
    <link rel="preload" as="image" href="/assets/pingty.png" />
    <link rel="preload" as="image" href="/assets/cover.png" />

    <!-- 브라우저 탭 아이콘 -->
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS 홈 화면 추가 아이콘 -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- iOS: 홈 화면 추가 후 브라우저 UI 없이 앱처럼 실행 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="반틈" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android / 데스크톱 PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#EFE9DC" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
